  .login-box button { width: 100%; padding: 12px; margin-top: 16px; background: #3182ce; color: #fff; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; transition: background 0.2s; }
  .login-box button:hover { background: #2c5282; }

  .spinner { display: none; margin-top: 12px; }
  .spinner::after { content: ""; display: inline-block; width: 20px; height: 20px; border: 3px solid #e2e8f0; border-top-color: #3182ce; border-radius: 50%; animation: spin 0.6s linear infinite; }

  .content-container { max-width: 860px; margin: 0 auto; padding: 40px 20px; display: none; }
  .content-container .header { text-align: center; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 2px solid #e2e8f0; }
  .content-container .header h1 { color: #1a365d; }
  #markdown-body { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 32px; }
  #markdown-body h1 { display: none; }
  #markdown-body h2 { color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-top: 32px; margin-bottom: 16px; }
  #markdown-body h3 { color: #2d3748; margin-top: 20px; margin-bottom: 8px; }
  #markdown-body table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  #markdown-body th, #markdown-body td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
  #markdown-body th { background: #f7fafc; font-weight: 600; }
  #markdown-body code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  #markdown-body pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; }
  #markdown-body pre code { background: none; color: inherit; padding: 0; }
  #markdown-body blockquote { border-left: 4px solid #3182ce; padding: 8px 16px; margin: 16px 0; background: #ebf8ff; color: #2c5282; }
  #markdown-body hr { border: none; border-top: 2px solid #e2e8f0; margin: 32px 0; }
  #markdown-body ul, #markdown-body ol { padding-left: 24px; margin: 8px 0; }
  #markdown-body strong { color: #1a365d; }
  .back-link { text-align: center; margin-top: 24px; }
  .back-link a { color: #3182ce; text-decoration: none; }
  .back-link a:hover { text-decoration: underline; }

const SALT_B64 = "amFndWVyLXNhbHQtMjAyNg==";
const ITERATIONS = 100000;

function b64ToUint8(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: ITERATIONS, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decrypt(password) {
  try {
    const salt = b64ToUint8(SALT_B64);
    const raw = b64ToUint8(ENCRYPTED_DATA);
    const nonce = raw.slice(0, 12);
    const ciphertext = raw.slice(12);
    const key = await deriveKey(password, salt);
    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ciphertext);
    return new TextDecoder().decode(decrypted);
  } catch (e) {
    return null;
  }
}

document.getElementById("password-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw = document.getElementById("password-input").value;
  const errEl = document.getElementById("error-msg");
  const spinEl = document.getElementById("spinner");
  const btnEl = document.getElementById("submit-btn");

  errEl.style.display = "none";
  spinEl.style.display = "block";
  btnEl.disabled = true;

  await new Promise(r => setTimeout(r, 50));
  const text = await decrypt(pw);

  spinEl.style.display = "none";
  btnEl.disabled = false;

  if (text) {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("content-section").style.display = "block";
    document.getElementById("markdown-body").innerHTML = marked.parse(text);
  } else {
    errEl.style.display = "block";
    document.getElementById("password-input").select();
  }
});

document.getElementById("password-input").focus();
